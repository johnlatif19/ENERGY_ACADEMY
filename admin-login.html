<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>تسجيل دخول • ENERGY ACADEMY</title>

  <!-- Tailwind + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  
  <!-- خط عربي أنيق -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at 20% 30%, #01050f, #000000);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s ease;
      position: relative;
    }

    /* تأثير شبكة طاقوية متقدمة */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(45deg, rgba(34, 240, 170, 0.025) 0px, rgba(34, 240, 170, 0.025) 2px, transparent 2px, transparent 8px),
        repeating-linear-gradient(135deg, rgba(255, 159, 28, 0.02) 0px, rgba(255, 159, 28, 0.02) 1px, transparent 1px, transparent 10px);
      pointer-events: none;
    }

    /* الوضع النهاري - ألوان الطاقة الفاتحة */
    body.light-mode {
      background: linear-gradient(125deg, #fef9e3, #e6f0fa, #fcfaee);
    }
    
    body.light-mode::before {
      background-image: 
        repeating-linear-gradient(45deg, rgba(15, 221, 140, 0.08) 0px, rgba(15, 221, 140, 0.08) 2px, transparent 2px, transparent 8px),
        repeating-linear-gradient(135deg, rgba(255, 159, 28, 0.06) 0px, rgba(255, 159, 28, 0.06) 1px, transparent 1px, transparent 10px);
    }

    /* الحاوية الزجاجية الرئيسية - ثيم الطاقة */
    .glass-container {
      background: rgba(8, 12, 26, 0.88);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(34, 240, 170, 0.35);
      box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(34, 240, 170, 0.2) inset;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      animation: fadeInUp 0.7s ease-out;
    }

    .glass-container:hover {
      border-color: #22f0aa;
      box-shadow: 0 0 35px rgba(34, 240, 170, 0.5), 0 30px 45px rgba(0, 0, 0, 0.5);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(35px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* أيقونة الطاقة الذهبية */
    .icon-wrapper {
      background: linear-gradient(145deg, rgba(34, 240, 170, 0.25), rgba(255, 159, 28, 0.2));
      border: 2px solid #ffb347;
      box-shadow: 0 0 20px rgba(255, 180, 71, 0.4);
      transition: all 0.3s;
    }
    
    .icon-wrapper i {
      color: #ffcd7e;
      text-shadow: 0 0 5px #ff9f1c;
    }

    /* حقول الإدخال بتأثير نيون أخضر */
    .input-field {
      background: rgba(0, 0, 0, 0.55) !important;
      border: 1px solid #2c3e3c !important;
      color: #eef2ff !important;
      border-radius: 1.25rem !important;
      transition: all 0.3s ease;
      padding: 0.9rem 1.1rem !important;
      width: 100%;
      font-size: 1rem;
      letter-spacing: 0.3px;
    }

    .input-field:focus {
      border-color: #22f0aa !important;
      box-shadow: 0 0 18px rgba(34, 240, 170, 0.6) !important;
      outline: none;
    }

    /* تسميات متحركة */
    .input-label {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
      transition: 0.25s ease;
      background: transparent;
      padding: 0 0.3rem;
      font-size: 0.95rem;
    }

    .input-wrapper input:focus ~ .input-label,
    .input-wrapper input:not(:placeholder-shown) ~ .input-label {
      top: 0;
      font-size: 0.7rem;
      color: #22f0aa;
      background: rgba(5, 8, 18, 0.9);
      border-radius: 0.75rem;
      padding: 0 0.6rem;
      transform: translateY(-50%);
    }

    /* زر النيون - طاقة خارقة */
    .neon-button {
      background: linear-gradient(105deg, #0fdd8c, #ff9f1c);
      border: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 14px #0fdd8c;
      color: white;
      font-weight: 800;
      padding: 0.85rem 1.5rem;
      border-radius: 3rem;
      width: 100%;
      font-size: 1.1rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    .neon-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,240,0.3), transparent);
      transition: left 0.6s ease;
    }

    .neon-button:hover::before {
      left: 100%;
    }

    .neon-button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 0 28px #22f0aa, 0 0 18px #ffb347;
    }

    .neon-button:active:not(:disabled) {
      transform: translateY(0px);
    }

    .neon-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* زر تبديل الوضع (طاقة / ضوء) */
    .theme-toggle {
      background: rgba(34, 240, 170, 0.18);
      border: 1px solid #ffb347;
      color: #e2e8f0;
      padding: 0.45rem 1rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 600;
    }

    .theme-toggle:hover {
      background: #ff9f1c;
      color: #03050b;
      border-color: #ffcd7e;
      box-shadow: 0 0 12px #ffb347;
    }

    /* رسالة الخطأ الانيقة */
    .error-message {
      color: #ffae70;
      font-size: 0.85rem;
      margin-top: 0.85rem;
      text-align: center;
      background: rgba(255, 90, 30, 0.12);
      padding: 0.6rem;
      border-radius: 1rem;
      border-right: 3px solid #ff9f1c;
      backdrop-filter: blur(2px);
    }

    /* تشييك بوكس بنمط الطاقة */
    .checkbox-custom {
      accent-color: #22f0aa;
      width: 1.1rem;
      height: 1.1rem;
      border-radius: 0.3rem;
      cursor: pointer;
      filter: drop-shadow(0 0 2px #0fdd8c);
    }

    /* الوضع الفاتح بألوان الأكاديمية */
    body.light-mode .glass-container {
      background: rgba(252, 250, 240, 0.92);
      border-color: rgba(15, 221, 140, 0.5);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
    }

    body.light-mode .input-field {
      background: rgba(255, 255, 245, 0.95) !important;
      border-color: #cfd9e6 !important;
      color: #1f2a3e !important;
    }

    body.light-mode .input-label {
      color: #5d6f88;
    }

    body.light-mode .input-wrapper input:focus ~ .input-label,
    body.light-mode .input-wrapper input:not(:placeholder-shown) ~ .input-label {
      background: #fffef7;
      color: #0f9d66;
    }

    body.light-mode .theme-toggle {
      background: rgba(15, 221, 140, 0.2);
      color: #1e2a2a;
      border-color: #0fdd8c;
    }
    
    body.light-mode .theme-toggle:hover {
      background: #0fdd8c;
      color: #000;
    }

    body.light-mode .icon-wrapper {
      background: linear-gradient(145deg, rgba(34, 240, 170, 0.3), rgba(255, 159, 28, 0.2));
      border-color: #ffb347;
    }
    
    body.light-mode h2 {
      background: linear-gradient(135deg, #0faa6e, #e5891a);
      background-clip: text;
      -webkit-background-clip: text;
    }
    
    body.light-mode .error-message {
      background: rgba(230, 80, 30, 0.12);
      color: #c2571a;
      border-right-color: #ff9f1c;
    }
    
    body.light-mode .checkbox-custom {
      accent-color: #0fdd8c;
    }

    /* سبينر تحميل */
    .loading-spinner {
      display: inline-block;
      width: 1.1rem;
      height: 1.1rem;
      border: 2px solid rgba(255,255,240,.4);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* استجابة تامة */
    @media (max-width: 500px) {
      .glass-container {
        width: 92%;
        padding: 1.5rem;
      }
      h2 {
        font-size: 1.6rem;
      }
      .theme-toggle span {
        display: none;
      }
      .theme-toggle i {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

  <!-- بطاقة تسجيل الدخول ENERGY-ACADEMY -->
  <div class="glass-container w-[90%] max-w-md rounded-3xl p-6 md:p-8 relative">
    
    <!-- أيقونة الصاعق / الطاقة -->
    <div class="flex justify-center mb-5">
      <div class="icon-wrapper w-16 h-16 rounded-2xl flex items-center justify-center text-4xl transition-all duration-300">
        <i class="fas fa-bolt"></i>
      </div>
    </div>

    <h2 class="text-2xl md:text-3xl font-extrabold text-center mb-6" style="background: linear-gradient(125deg, #22f0aa, #ffb347); background-clip: text; -webkit-background-clip: text; color: transparent;">
      مرحباً في ENERGY-ACADEMY
    </h2>

    <form id="loginForm" autocomplete="off">
      <!-- حقل اسم المستخدم -->
      <div class="input-wrapper relative mb-7">
        <input type="text" id="username" name="username" required placeholder=" "
               class="input-field peer" />
        <label for="username" class="input-label">اسم المستخدم</label>
      </div>

      <!-- حقل كلمة المرور -->
      <div class="input-wrapper relative mb-2">
        <input type="password" id="password" name="password" required placeholder=" "
               class="input-field peer" />
        <label for="password" class="input-label">كلمة المرور</label>
      </div>

      <!-- إظهار كلمة المرور -->
      <div class="flex items-center gap-2 mt-2 mb-6">
        <input type="checkbox" id="showPassword" class="checkbox-custom" />
        <label for="showPassword" class="text-sm text-gray-400 cursor-pointer transition hover:text-primary-light">إظهار كلمة المرور</label>
      </div>

      <!-- زر تسجيل الدخول -->
      <div class="mt-6">
        <button type="submit" id="submitBtn" class="neon-button">
          <span class="inline-flex items-center justify-center gap-2">
            <i class="fas fa-charging-station"></i> دخول إلى المنصة
          </span>
        </button>
      </div>

      <!-- رسالة الخطأ -->
      <div id="errorMsg" class="error-message min-h-[3rem] hidden"></div>
    </form>

    <!-- خيارات إضافية -->
    <div class="flex justify-between items-center mt-6 pt-2 text-xs text-gray-400">
      <span>© 2026 ENERGY-ACADEMY</span>
      <button id="darkModeToggle" class="theme-toggle">
        <i class="fas fa-moon"></i>
        <span class="hidden sm:inline">الوضع الليلي</span>
      </button>
    </div>
  </div>

  <script>
    // ------------------- ثيم الطاقة (نهاري/ليلي) -------------------
    function initTheme() {
      const savedTheme = localStorage.getItem('energyTheme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        document.body.classList.remove('dark-mode');
        updateThemeButton(true);
      } else {
        document.body.classList.add('dark-mode');
        document.body.classList.remove('light-mode');
        updateThemeButton(false);
      }
    }

    function updateThemeButton(isLight) {
      const toggleBtn = document.getElementById('darkModeToggle');
      if (isLight) {
        toggleBtn.innerHTML = '<i class="fas fa-sun"></i> <span class="hidden sm:inline">الوضع النهاري</span>';
      } else {
        toggleBtn.innerHTML = '<i class="fas fa-moon"></i> <span class="hidden sm:inline">الوضع الليلي</span>';
      }
    }

    const darkModeToggle = document.getElementById('darkModeToggle');
    darkModeToggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light-mode');
      document.body.classList.toggle('dark-mode', !isLight);
      localStorage.setItem('energyTheme', isLight ? 'light' : 'dark');
      updateThemeButton(isLight);
    });

    initTheme();

    // ------------------- إظهار/إخفاء كلمة المرور -------------------
    const showPasswordCheckbox = document.getElementById('showPassword');
    const passwordInput = document.getElementById('password');
    
    showPasswordCheckbox.addEventListener('change', function() {
      passwordInput.type = this.checked ? 'text' : 'password';
    });

    // ------------------- معالجة تسجيل الدخول (محاكاة/حقيقية للوحة تحكم وهمية تجريبية) -------------------
    const loginForm = document.getElementById('loginForm');
    const errorMsgDiv = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    // للتوضيح: نستخدم API /admin/login وهذا قابل للتعديل مع الواجهة الخلفية الحقيقية
    // لتجنب أخطاء الشبكة في العرض التوضيحي، قمنا بإضافة محاكاة ذكية تعرض رسالة توضيحية مع خيار تجريبي
    // ولكن في حالة وجود API حقيقي يتم استدعاء fetch بالكامل دون تغيير.
    // نضيف أيضاً تجربة معاينة لسهولة الاختبار (لن نعطل الوظيفة الأصلية)
    
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="inline-flex items-center gap-2"><span class="loading-spinner"></span> يتم التحقق من الطاقة...</span>';
      errorMsgDiv.classList.add('hidden');
      errorMsgDiv.textContent = '';

      const data = {
        username: loginForm.username.value.trim(),
        password: loginForm.password.value.trim()
      };

      if (!data.username || !data.password) {
        showError('⚠️ يرجى إدخال اسم المستخدم وكلمة المرور');
        resetButton();
        return;
      }

      // محاولة الاتصال بالخادم الخلفي الحقيقي - في حال عدم وجود الخادم نعطي رسالة مناسبة
      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok && result.success) {
          // فحص الجلسة
          const sessionCheck = await fetch('/admin/check-session');
          const sessionData = await sessionCheck.json();
          if (sessionData.loggedIn) {
            window.location.href = '/admin/dashboard';
          } else {
            showError('⚠️ فشل التحقق من الجلسة، يرجى إعادة المحاولة');
          }
        } else {
          showError(result.message || '❌ اسم المستخدم أو كلمة المرور غير صحيحة، حاول مجدداً');
        }
      } catch (err) {
        console.warn('NETWORK / BACKEND غير متاح، نوفر تجربة وهمية لاختبار الواجهة');
        // بيئة تطوير بدون خادم: محاكاة تفاعلية (لأغراض العرض والتجربة فقط)
        if (data.username === "ENERGY" && data.password === "academy2026") {
          // محاكاة ناجحة مؤقتة (يمكن للمطور إلغاء عند ربط الباك اند)
          errorMsgDiv.classList.add('hidden');
          alert("✅ تجربة تسجيل الدخول ناجحة (وضع المعاينة)\nتم توجيهك إلى لوحة التحكم التجريبية.");
          // في الإنتاج يتم استبدالها بـ window.location.href = '/admin/dashboard'؛
          // نضيف محاكاة توافقية للعرض
          window.location.href = "#success-demo";
        } else {
          showError('🔐 بيانات دخول خاطئة (يمكنك استخدام: ENERGY / academy2026 للاختبار التجريبي)');
        }
        resetButton();
        return;
      }
      resetButton();
    });

    function showError(message) {
      errorMsgDiv.textContent = message;
      errorMsgDiv.classList.remove('hidden');
    }

    function resetButton() {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<span class="inline-flex items-center justify-center gap-2"><i class="fas fa-charging-station"></i> دخول إلى المنصة</span>';
    }

    // عند الضغط على Enter في أي حقل
    const inputs = document.querySelectorAll('#username, #password');
    inputs.forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          loginForm.dispatchEvent(new Event('submit'));
        }
      });
    });

    // تحسين التركيز على الحقول
    const allInputs = document.querySelectorAll('.input-field');
    allInputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.classList.add('focused');
      });
      input.addEventListener('blur', () => {
        if (!input.value) {
          input.parentElement.classList.remove('focused');
        }
      });
    });

    // لإضافة تلميح في حالة عدم اتصال الخادم: لتجربة سريعة
    const style = document.createElement('style');
    style.textContent = `/* تلميح بسيط */ .glass-container { transition: 0.2s; }`;
    document.head.appendChild(style);
  </script>
</body>
</html>
